name: Deploy via SSM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: ha-lab-deploy-bucket-${{ secrets.AWS_ACCOUNT_ID }}
  ASG_NAME: ha-lab-asg
  DEPLOY_DIR: /var/www/html

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create deploy package
        run: |
          zip deploy.zip index.html

      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://${S3_BUCKET}/deploy.zip

      - name: Get ASG instances
        id: get_instances
        run: |
          IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${ASG_NAME}" \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text)

          echo "ids=$IDS" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSM and wait
        run: |
          for id in ${{ steps.get_instances.outputs.ids }}; do
            echo "Deploying to $id"

            CMD_ID=$(aws ssm send-command \
              --instance-ids "$id" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=[
                "aws s3 cp s3://${{ env.S3_BUCKET }}/deploy.zip /tmp/deploy.zip",
                "rm -rf /tmp/deploy",
                "mkdir -p /tmp/deploy",
                "unzip -o /tmp/deploy.zip -d /tmp/deploy",
                "cp -r /tmp/deploy/* ${{ env.DEPLOY_DIR }}/",
                "ls -al ${{ env.DEPLOY_DIR }}",
                "nginx -t",
                "systemctl reload nginx"
              ]' \
              --timeout-seconds 300 \
              --query "Command.CommandId" \
              --output text)

            echo "Command ID: $CMD_ID"

            aws ssm wait command-executed \
              --command-id "$CMD_ID" \
              --instance-id "$id"

            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$id" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done
